<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Arena - Superman vs Demon 1v1</title>
    <link rel="stylesheet" href="css/game1.css">
</head>
<body>

    <div id="ui-p1">
        <h1>SUPERMAN</h1>
        <h2>HEALTH: <span id="health-p1">100</span></h2>
        <p>MOVE: WASD | SHOOT: SPACE</p>
    </div>

    <div id="ui-p2">
        <h1>DEMON</h1>
        <h2>HEALTH: <span id="health-p2">100</span></h2>
        <p>MOVE: ARROWS | SHOOT: ENTER</p>
    </div>

    <div id="gameOverScreen">
        <h1 id="winnerText">PLAYER WINS!</h1>
        <button onclick="location.reload()">REMATCH</button>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen">
        <h1>yoooo hehe 😁😜</h1>
        <p id="instructionsText"></p>

        <button onclick="startGame()">START GAME</button>
        <button onclick="goHome()">BACK</button>

        <!-- ✅ NEW BUTTON ADDED -->
        <button onclick="showControls()">HOW TO PLAY</button>
    </div>

    <!-- PAUSE SCREEN -->
    <div id="pauseScreen">
        <h1>PAUSED</h1>
        <button onclick="resumeGame()">RESUME</button>
        <button onclick="restartGame()">RESTART</button>
        <button onclick="goHome()">HOME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- ✅ CONTROLS POPUP (NEW) -->
    <div id="controlsModal" class="modal">
        <div class="modal-content">
            <h2>HOW TO PLAY</h2>

            <p>
            👤 PLAYER 1<br>
            MOVE: W A S D<br>
            SHOOT: SPACE<br><br>

            👤 PLAYER 2<br>
            MOVE: ARROW KEYS<br>
            SHOOT: ENTER
            </p>

            <button onclick="closeControls()">CLOSE</button>
        </div>
    </div>

    <script src="js/game1.js"></script>
</body>
</html>
