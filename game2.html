<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Arena - Superman vs Demons</title>
    <link rel="stylesheet" href="css/game2.css">
</head>
<body>

    <div id="ui">
        <h1>SCORE: <span id="score">0</span></h1>
        <h2>Ship Health: <span id="health">100</span></h2> 
        <h2>TIME: <span id="time">0</span>s</h2>

        <!-- HEALTH BAR -->
        <div id="healthBarContainer">
            <div id="healthBar"></div>
        </div>
    </div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <h2>Final Score: <span id="finalScore">0</span></h2>
        <h2>Time Survived: <span id="finalTime">0</span>s</h2>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen">
        <h1>yoooo hehe 😁😜</h1>
        <p id="instructionsText"></p>

        <button onclick="startGame()">START GAME</button>
        <button onclick="goHome()">BACK</button>

        <!-- ✅ NEW BUTTON -->
        <button onclick="showControls()">HOW TO PLAY</button>
    </div>

    <!-- PAUSE SCREEN -->
    <div id="pauseScreen">
        <h1>PAUSED</h1>
        <button onclick="resumeGame()">RESUME</button>
        <button onclick="restartGame()">RESTART</button>
        <button onclick="goHome()">HOME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- ✅ CONTROLS POPUP -->
    <div id="controlsModal" class="modal">
        <div class="modal-content">
            <h2>HOW TO PLAY</h2>

            <p>
            🎮 MOVE: W A S D<br><br>
            🎯 AIM: Mouse<br><br>
            🔫 SHOOT: Left Click<br><br>
            ❤️ Collect health packs<br><br>
            ⚠️ Survive as long as possible
            </p>

            <button onclick="closeControls()">CLOSE</button>
        </div>
    </div>

    <script src="js/game2.js"></script>
</body>
</html>
